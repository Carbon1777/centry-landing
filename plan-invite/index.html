<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centry — Приглашение в план</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      text-align: center;
      padding: 40px 24px;
      max-width: 360px;
    }
    .card h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .card p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 12px;
      background: #fff;
      color: #0a0a0a;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
      width: 100%;
      text-align: center;
    }
    .btn:active { opacity: 0.7; }
    .btn--outline {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      font-size: 14px;
      padding: 12px 24px;
    }
    .stores {
      display: none;
      margin-top: 20px;
      gap: 10px;
    }
    .stores.visible {
      display: flex;
      flex-direction: column;
    }
    .hint {
      display: none;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-top: 16px;
      line-height: 1.4;
    }
    .hint.visible { display: block; }
    .copied-toast {
      display: none;
      font-size: 13px;
      color: #4ade80;
      margin-top: 8px;
    }
    .copied-toast.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Приглашение в план</h1>
    <p>Вас пригласили присоединиться к плану в Centry.</p>

    <a id="open-btn" class="btn" href="#">Открыть в приложении</a>

    <div id="stores" class="stores">
      <a id="link-appstore" class="btn btn--outline" href="#" style="display:none;">
        App Store
      </a>
      <a id="link-google" class="btn btn--outline" href="#" style="display:none;">
        Google Play
      </a>
      <a id="link-rustore" class="btn btn--outline" href="#" style="display:none;">
        RuStore
      </a>
    </div>

    <div id="copied-toast" class="copied-toast">Ссылка скопирована — откройте приложение после установки</div>
    <div id="hint" class="hint">После установки приложение автоматически подхватит приглашение.</div>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token') || params.get('plan_invite_token') || params.get('invite_token') || '';

      // Deep link в приложение через custom scheme
      var deepLink = 'centry://plan-invite' + (token ? '?token=' + encodeURIComponent(token) : '');

      // Полный HTTPS URL для clipboard (приложение парсит его при первом запуске)
      var fullUrl = window.location.href;

      var btn = document.getElementById('open-btn');
      btn.href = deepLink;

      // --- Копируем полный URL в clipboard для deferred deep link ---
      if (token && navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(fullUrl).then(function() {
          document.getElementById('copied-toast').classList.add('visible');
        }).catch(function() {
          // Clipboard API недоступен — не критично
        });
      }

      // --- Определяем платформу и показываем нужную кнопку стора ---
      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      var appStoreUrl = 'https://apps.apple.com/app/id6761648930';
      var googlePlayUrl = 'https://play.google.com/store/apps/details?id=com.centry.mobile.app';
      var ruStoreUrl = 'https://www.rustore.ru/catalog/app/website.centry.app';

      var storesDiv = document.getElementById('stores');
      var linkAppStore = document.getElementById('link-appstore');
      var linkGoogle = document.getElementById('link-google');
      var linkRustore = document.getElementById('link-rustore');

      if (isIOS && appStoreUrl) {
        linkAppStore.href = appStoreUrl;
        linkAppStore.style.display = '';
        storesDiv.classList.add('visible');
      } else if (isAndroid) {
        if (googlePlayUrl) {
          linkGoogle.href = googlePlayUrl;
          linkGoogle.style.display = '';
          storesDiv.classList.add('visible');
        }
        if (ruStoreUrl) {
          linkRustore.href = ruStoreUrl;
          linkRustore.style.display = '';
          storesDiv.classList.add('visible');
        }
      }

      if (storesDiv.classList.contains('visible')) {
        document.getElementById('hint').classList.add('visible');
      }

      // --- Пробуем открыть приложение через deep link ---
      window.location.href = deepLink;
    })();
  </script>
</body>
</html>
