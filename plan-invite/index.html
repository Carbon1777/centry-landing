<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centry — Приглашение в план</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      text-align: center;
      padding: 40px 24px;
      max-width: 360px;
    }
    .card h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .card p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 12px;
      background: #fff;
      color: #0a0a0a;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Приглашение в план</h1>
    <p>Вас пригласили присоединиться к плану в Centry.</p>
    <a id="open-btn" class="btn" href="#">Открыть в приложении</a>
  </div>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token') || params.get('plan_invite_token') || params.get('invite_token') || '';

      // Deep link в приложение через custom scheme
      var deepLink = 'centry://plan-invite' + (token ? '?token=' + encodeURIComponent(token) : '');

      var btn = document.getElementById('open-btn');
      btn.href = deepLink;

      // Автоматический редирект: пробуем открыть приложение сразу.
      // Если через 1.5 сек страница ещё видна — значит приложение не открылось,
      // кнопка останется доступна для ручного тапа.
      var t0 = Date.now();
      window.location.href = deepLink;

      // Если пользователь вернулся на страницу (приложение не перехватило) —
      // ничего не делаем, кнопка уже видна.
    })();
  </script>
</body>
</html>
